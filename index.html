<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Skins Discord</title>
    <style>
        body {
            margin: 0;
            background: #111111;
            color: white;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .server-card {
            text-align: center;
            background: #18191c;
            padding: 30px;
            border-radius: 15px;
            border: 1px solid #333;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }
        .banner {
            display: block;
            margin-bottom: 20px;
            border-radius: 8px;
            transition: 0.3s;
            max-width: 100%;
        }
        .banner:hover {
            transform: scale(1.02);
            filter: brightness(1.2);
        }
        .btn-join {
            display: inline-block;
            background: #5865F2;
            color: white;
            text-decoration: none;
            padding: 12px 25px;
            border-radius: 5px;
            font-weight: bold;
            transition: 0.2s;
        }
        .btn-join:hover {
            background: #4752c4;
        }
    </style>
</head>
<body>

    <div class="server-card">
        <h2>Наш статус в Discord 🚀</h2>
        
        <!-- Живой баннер сервера (обновляется сам) -->
        <a href="https://discord.gg" target="_blank">
            <img class="banner" src="https://discord.com" alt="Discord Status">
        </a>

        <p>Заходи к нам, чтобы обсудить скины!</p>
        <a href="https://discord.gg" class="btn-join" target="_blank">ПРИСОЕДИНИТЬСЯ</a>
    </div>

</body>
</html>
